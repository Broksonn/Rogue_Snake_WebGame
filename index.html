<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue-Snake MVP (NEON VIPER - ARENA EDITION)</title>
    <style>
        :root {
            --bg-color: #0a0a0c; --grid-color: #1a1a24;
            --apple-color: #ff073a; --acid-color: #adff2f;
            --ui-bg: rgba(20, 20, 30, 0.95); --text-main: #e0e0e0; --gold: #ffd700;
        }

        body {
            margin: 0; padding: 0; background-color: #000; color: var(--text-main);
            font-family: 'Courier New', Courier, monospace; display: flex;
            justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none;
        }

        #game-wrapper {
            position: relative; width: 600px; height: 600px;
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.1); transition: box-shadow 0.3s, transform 0.1s;
        }

        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        .shake-heavy { animation: shakeHeavy 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-3px, 0, 0) rotate(-1deg); }
            20%, 80% { transform: translate3d(4px, 0, 0) rotate(1deg); }
            30%, 50%, 70% { transform: translate3d(-10px, 0, 0) rotate(-2deg); }
            40%, 60% { transform: translate3d(10px, 0, 0) rotate(2deg); }
        }
        @keyframes shakeHeavy {
            10%, 90% { transform: translate3d(-8px, 8px, 0) rotate(-3deg); }
            20%, 80% { transform: translate3d(10px, -10px, 0) rotate(3deg); }
            30%, 50%, 70% { transform: translate3d(-15px, 10px, 0) rotate(-5deg); }
            40%, 60% { transform: translate3d(15px, -5px, 0) rotate(5deg); }
        }

        canvas { background-color: var(--bg-color); border: 2px solid #333; border-radius: 4px; }

        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 10px;
            box-sizing: border-box; display: flex; justify-content: space-between;
            pointer-events: none; text-shadow: 0 0 5px var(--text-main); font-weight: bold; z-index: 10;
        }

        #xp-container { width: 200px; height: 15px; background: #222; border: 1px solid #555; border-radius: 8px; overflow: hidden; position: relative; }
        #xp-bar { height: 100%; width: 0%; background: var(--gold); box-shadow: 0 0 10px var(--gold); transition: width 0.2s ease-out; }
        
        #combo-display {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            font-size: 1.5em; color: #ff073a; text-shadow: 0 0 10px #ff073a;
            opacity: 0; transition: opacity 0.2s, transform 0.1s; pointer-events: none;
        }
        .combo-active { opacity: 1 !important; transform: translateX(-50%) scale(1.2) !important; }

        .coin-counter { color: var(--gold); font-size: 1.2em; text-shadow: 0 0 10px var(--gold); }

        .flash { animation: flash 0.3s ease-out; }
        .flash-revive { animation: flashRevive 1s ease-out; }
        @keyframes flash { 0% { background: #fff; box-shadow: 0 0 20px #fff; } 100% { background: var(--gold); box-shadow: 0 0 10px var(--gold); } }
        @keyframes flashRevive { 0% { background: #fff; } 100% { background: transparent; } }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ui-bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20; backdrop-filter: blur(4px); display: none;
        }

        .overlay h1 { color: var(--gold); text-shadow: 0 0 15px var(--gold); font-size: 3em; margin-bottom: 20px; text-align: center; }

        button {
            background: rgba(0,0,0,0.5); color: var(--text-main); border: 2px solid var(--text-main); padding: 15px 30px;
            font-size: 1.2em; font-family: inherit; cursor: pointer; margin: 10px; border-radius: 5px;
            transition: all 0.2s; text-transform: uppercase; font-weight: bold;
        }
        button:hover, button.focused { background: var(--text-main); color: var(--bg-color); box-shadow: 0 0 15px var(--text-main); transform: scale(1.05); }

        .skins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; height: 350px; overflow-y: auto; padding-right: 10px; }
        .skins-grid::-webkit-scrollbar { width: 8px; }
        .skins-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        
        .skin-card {
            background: #111; border: 2px solid #555; border-radius: 8px; padding: 20px; width: 150px;
            text-align: center; transition: all 0.2s; display: flex; flex-direction: column; align-items: center;
        }
        .skin-card.unlocked { cursor: pointer; }
        .skin-card.unlocked:hover, .skin-card.unlocked.focused { transform: translateY(-5px); border-color: #888; }
        .skin-card.selected-skin { border-color: var(--gold) !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); background: #1a1a00; }
        .skin-card.locked { opacity: 0.6; filter: grayscale(100%); }
        .skin-preview { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; height: 50px;}
        .skin-title { font-weight: bold; text-transform: uppercase; text-shadow: 0 0 5px currentColor; margin-bottom: 10px; font-size: 0.9em; }
        
        .buy-btn { background: #222; color: #ffd700; border: 1px solid #ffd700; padding: 5px 10px; font-size: 0.9em; margin: 0; width: 100%; cursor: pointer;}
        .buy-btn:hover, .buy-btn.focused { background: #ffd700; color: #000; }

        .min-box { width: 20px; height: 20px; box-shadow: 0 0 5px currentColor; }
        .min-circle { width: 20px; height: 20px; border-radius: 50%; box-shadow: 0 0 5px currentColor; }
        .min-train { width: 20px; height: 20px; border: 3px solid currentColor; background: transparent !important; }
        .min-viper { width: 20px; height: 20px; border: 2px solid #aaa; background: #00ffff; box-shadow: 0 0 5px #00ffff; }

        .cards-container { display: flex; gap: 15px; }
        .card {
            background: #111; border: 2px solid #555; border-radius: 8px; padding: 15px; width: 160px; text-align: center; cursor: pointer;
            position: relative; overflow: hidden; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, border-color 0.3s; 
            display: flex; flex-direction: column; align-items: center;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent); transform: skewX(-25deg); transition: 0.5s;
        }
        .card:hover, .card.focused { transform: scale(1.1) translateY(-10px); z-index: 10; }
        .card:hover::before, .card.focused::before { left: 150%; }

        .card.common:hover, .card.common.focused { border-color: #fff; box-shadow: 0 0 25px rgba(255, 255, 255, 0.6); }
        .card.rare { border-color: #2a6f97; } .card.rare:hover, .card.rare.focused { border-color: #4da6ff; box-shadow: 0 0 30px rgba(77, 166, 255, 0.8); }
        .card.epic { border-color: #7b2cbf; } .card.epic:hover, .card.epic.focused { border-color: #b266ff; box-shadow: 0 0 30px rgba(178, 102, 255, 0.8); }
        .card.legendary { border-color: #b8860b; } .card.legendary:hover, .card.legendary.focused { border-color: #ffd700; box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }

        .card.rolling { pointer-events: none; border-color: #333; filter: grayscale(80%); transform: scale(0.95); }
        .card.jackpot { border-color: #ffd700 !important; box-shadow: 0 0 50px #ffd700 !important; transform: scale(1.2) !important; filter: none !important; z-index: 50; }

        .card-icon { font-size: 3em; height: 60px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; transition: transform 0.3s; }
        .card:hover .card-icon, .card.focused .card-icon { transform: scale(1.15); }

        /* --- STYLE DLA NAWIGACJI KLAWIATURĄ (FOCUS) --- */
        .card.common.focused .card-title { color: #fff !important; }
        .card.rare.focused .card-title { color: #80c1ff !important; text-shadow: 0 0 10px #4da6ff; }
        .card.epic.focused .card-title { color: #d9b3ff !important; text-shadow: 0 0 10px #b266ff; }
        .card.legendary.focused .card-title { color: #ffeb99 !important; text-shadow: 0 0 10px #ffd700; }
        
        .glow-blue { filter: drop-shadow(0 0 10px #4da6ff); } .glow-purple { filter: drop-shadow(0 0 10px #b266ff); }
        .glow-gold { filter: drop-shadow(0 0 10px #ffd700); } .glow-green { filter: drop-shadow(0 0 10px #adff2f); }
        .glow-white { filter: drop-shadow(0 0 10px #ffffff); } .glow-red { filter: drop-shadow(0 0 10px #ff073a); }
        .glow-pink { filter: drop-shadow(0 0 10px #ff66b2); } .glow-grey { filter: drop-shadow(0 0 10px #aaaaaa); }

        .card-title { font-weight: bold; margin-bottom: 5px; font-size: 1em; transition: color 0.3s; }
        .card.common:hover .card-title { color: #fff !important; }
        .card.rare:hover .card-title { color: #80c1ff !important; text-shadow: 0 0 10px #4da6ff; }
        .card.epic:hover .card-title { color: #d9b3ff !important; text-shadow: 0 0 10px #b266ff; }
        .card.legendary:hover .card-title { color: #ffeb99 !important; text-shadow: 0 0 10px #ffd700; }
        .card-desc { font-size: 0.75em; color: #aaa; line-height: 1.2; }
        
        .stats-panel { background: #111; border: 2px solid #555; padding: 20px 40px; border-radius: 8px; text-align: center; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .stats-panel h2 { margin-top: 0; color: var(--gold); text-transform: uppercase; font-size: 1.4em; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        #status-effects { position: absolute; top: 40px; right: 10px; display: flex; flex-direction: column; gap: 5px; pointer-events: none; z-index: 10; text-align: right; }
        .effect-badge { background: rgba(0,0,0,0.8); border: 1px solid #555; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="flash-overlay" style="position: absolute; top:0; left:0; width: 100%; height: 100%; pointer-events: none; z-index: 15;"></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <div id="hud">
        <div>
            <div id="score-display">Wynik: 0</div>
            <div id="level-display">Poziom: 1</div>
        </div>
        <div style="text-align: right;">
            <div id="xp-container"><div id="xp-bar"></div></div>
        </div>
    </div>

    <div id="combo-display">COMBO x2!</div>
    <div id="status-effects"></div>

    <div id="menu-screen" class="overlay" style="display: flex;">
        <h1 style="font-size: 4em;">ROGUE-SNAKE</h1>
        <div class="coin-counter" id="menu-coins" style="font-size: 2em; margin-bottom: 20px;">🪙 0</div>
        <button onclick="startGame()">Nowa Gra</button>
        <button onclick="showSkinsMenu()" style="border-color: #888; color: #aaa;">Sklep & Skórki</button>
    </div>

    <div id="skins-screen" class="overlay">
        <h1>SKLEP SKÓREK</h1>
        <div class="coin-counter" id="shop-coins" style="font-size: 1.5em; margin-bottom: 20px;">🪙 0</div>
        <div class="skins-grid" id="skins-container"></div>
        <button onclick="showMainMenu()">Wróć do Menu</button>
    </div>

    <div id="levelup-screen" class="overlay">
        <h1 style="font-size: 2.5em;">AWANS NA POZIOM <span id="new-level-text">2</span>!</h1>
        <p style="margin-bottom: 20px; font-weight: bold; color: #fff;">Wybierz jedno ulepszenie:</p>
        <div class="cards-container" id="dynamic-cards-container"></div>
    </div>

    <div id="mouse-screen" class="overlay">
        <h1 id="mouse-title" style="font-size: 3.5em; color: #aaaaaa; text-shadow: 0 0 20px #ffffff;">LOSOWANIE...</h1>
        <p id="mouse-subtitle" style="margin-bottom: 30px; font-weight: bold; color: #fff;">Mysz kryje w sobie legendarny łup!</p>
        <div class="cards-container" id="mouse-cards-container"></div>
    </div>

    <div id="gameover-screen" class="overlay">
        <h1 id="gameover-title" style="color: #ff073a; text-shadow: 0 0 20px #ff073a; margin-bottom: 10px; font-size: 4em;">ZDERZENIE!</h1>
        <div class="stats-panel">
            <h2>Statystyki Sesji</h2>
            <div id="final-stats" style="font-size: 1.2em; line-height: 1.6;"></div>
        </div>
        <button onclick="resetToMenu()">Wróć do Menu</button>
    </div>
</div>

<script>
    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isMusicPlaying = false; let nextNoteTime = 0; let currentStep = 0;
    
    const bassline = [ 41.20, 41.20, 82.41, 41.20, 41.20, 41.20, 82.41, 41.20, 49.00, 49.00, 98.00, 49.00, 49.00, 49.00, 98.00, 49.00 ];

    function playBassSynth(freq, time, duration) {
        if (audioCtx.state === 'suspended') return;
        const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain(); const filter = audioCtx.createBiquadFilter();
        osc1.type = 'sawtooth'; osc2.type = 'square';
        osc1.frequency.setValueAtTime(freq, time); osc2.frequency.setValueAtTime(freq * 1.01, time); 
        filter.type = 'lowpass'; filter.frequency.setValueAtTime(800, time); filter.frequency.exponentialRampToValueAtTime(80, time + duration);
        osc1.connect(filter); osc2.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.08, time); gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
        osc1.start(time); osc1.stop(time + duration); osc2.start(time); osc2.stop(time + duration);
    }

    function playKick(time) {
        if (audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(150, time); osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.1);
        gain.gain.setValueAtTime(0.25, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
        osc.start(time); osc.stop(time + 0.1);
    }

    function playRevealSound() {
        if (audioCtx.state === 'suspended') return;
        const now = audioCtx.currentTime;
        [261.63, 329.63, 392.00, 523.25].forEach(freq => {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
            osc.start(now); osc.stop(now + 3);
        });
    }

    function playTick() {
        if (audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.value = 800;
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function scheduleMusic() {
        if (!isMusicPlaying) return;

        if (currentState === STATES.PLAYING) {
            let musicPace = Math.max(0.08, baseSpeedDelay / 1000); 
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                playBassSynth(bassline[currentStep % 16], nextNoteTime, musicPace);
                if (currentStep % 4 === 0) playKick(nextNoteTime);
                nextNoteTime += musicPace; currentStep++;
            }
        } 
        else if (currentState === STATES.MOUSE_ROLLING) {
            let musicPace = 0.08; 
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                let freq = 150 + (currentStep % 32) * 15; 
                playBassSynth(freq, nextNoteTime, musicPace);
                nextNoteTime += musicPace; currentStep++;
            }
        }

        requestAnimationFrame(scheduleMusic);
    }

    function playSound(type, combo = 1) {
        if (audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination); const now = audioCtx.currentTime;
        if (type === 'eat') {
            osc.type = 'square'; let baseFreq = 300 + (combo * 50); 
            osc.frequency.setValueAtTime(baseFreq, now); osc.frequency.exponentialRampToValueAtTime(baseFreq + 200, now + 0.1);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'levelup') {
            osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.1); 
            osc.frequency.setValueAtTime(659.25, now + 0.2); osc.frequency.setValueAtTime(880, now + 0.3); 
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'die') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.5);
            gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'bounce' || type === 'coin') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(type==='coin'?1200:800, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
            gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('game-wrapper');

    const STATES = { MENU: 0, PLAYING: 1, LEVELUP: 2, DEATH_ANIM: 3, GAMEOVER: 4, REVIVE_PAUSE: 5, SKINS: 6, MOUSE_ROLLING: 7, MOUSE_REWARD: 8 };
    let currentState = STATES.MENU;

    const TILE_SIZE = 30; const TILES_X = canvas.width / TILE_SIZE; const TILES_Y = canvas.height / TILE_SIZE;
    
    let bankCoins = parseInt(localStorage.getItem('rogueSnakeCoins')) || 0;
    let unlockedSkins = JSON.parse(localStorage.getItem('rogueSnakeSkins')) || ['snake'];

    const SKINS = [
        { id: 'snake', name: 'Klasyczny Neon', type: 'snake', body: '#39ff14', head: '#66ff4d', price: 0 },
        { id: 'virus', name: 'Wirus', type: 'virus', body: '#ff073a', head: '#ff4d79', price: 20 },
        { id: 'train', name: 'Cyber Pociąg', type: 'train', body: '#00ffff', head: '#ffffff', price: 50 },
        { id: 'rainbow', name: 'Nyan', type: 'rainbow', body: '#ffd700', head: '#ff99cc', price: 100 },
        { id: 'neon_viper', name: 'Neon Viper', type: 'viper', body: '#aaaaaa', head: '#00ffff', price: 10 }
    ];
    
    SKINS.forEach(s => { s.unlocked = unlockedSkins.includes(s.id); });
    let activeSkin = SKINS[0];

    const ALL_PERKS = [
        { name: 'Dieta Cud', rarity: 'common', desc: 'Skraca ogon o 3 segmenty ułatwiając manewrowanie.', icon: '🍖', titleColor: '#aaa', classGlow: 'glow-pink' },
        { name: 'Żółwie Tempo', rarity: 'common', desc: 'Na stałe zmniejsza prędkość węża o 10%.', icon: '🐢', titleColor: '#aaa', classGlow: 'glow-green' },
        { name: 'Złomiarz', rarity: 'common', desc: 'Na planszy pojawiają się na stałe 2 jabłka.', icon: '🍒', titleColor: '#aaa', classGlow: 'glow-red' },
        { name: 'Gruby Pancerz', rarity: 'common', desc: 'Odbija od ściany 1 raz na poziom.', icon: '🛡️', titleColor: '#aaa', classGlow: 'glow-white' },
        { name: 'Dalekowidz', rarity: 'common', desc: 'Na planszy pojawia się marker następnego jabłka.', icon: '👁️', titleColor: '#aaa', classGlow: 'glow-white' },
        { name: 'Złote Jabłka', rarity: 'rare', desc: 'Jabłka dają 2x więcej XP, wąż rośnie o 2.', icon: '🍎', titleColor: '#4da6ff', classGlow: 'glow-gold' },
        { name: 'Zastrzyk Adrenaliny', rarity: 'rare', desc: '1 Ładunek: Następne jabłko przyspiesza Cię na 2s.', icon: '💉', titleColor: '#4da6ff', classGlow: 'glow-blue' },
        { name: 'Ostre Zakręty', rarity: 'rare', desc: 'Pozwala na wykonanie zwrotu o 180 stopni w miejscu.', icon: '↪️', titleColor: '#4da6ff', classGlow: 'glow-blue' },
        { name: 'Teleportacja', rarity: 'epic', desc: 'Krawędzie mapy zapętlają się. Trwa przez 1 poziom.', icon: '🌀', titleColor: '#b266ff', classGlow: 'glow-purple' },
        { name: 'Kwas żołądkowy', rarity: 'epic', desc: 'Bomba: kwasowe jabłko niszczy 5 segmentów ogona.', icon: '🧪', titleColor: '#b266ff', classGlow: 'glow-green' },
        { name: 'Duch', rarity: 'epic', desc: 'Przez 10s po zdobyciu przenikasz przez własny ogon.', icon: '👻', titleColor: '#b266ff', classGlow: 'glow-white' },
        { name: 'Ostatnie Tchnienie', rarity: 'legendary', desc: 'Śmiertelna kolizja ucina połowę ogona ratując grę (1 raz).', icon: '❤️‍🔥', titleColor: '#ffd700', classGlow: 'glow-gold' },
        { name: 'Zamrożenie Czasu', rarity: 'legendary', desc: '1 Ładunek: Następne jabłko spowalnia czas na 3 sekundy.', icon: '❄️', titleColor: '#ffd700', classGlow: 'glow-blue' }
    ];

    let snake = []; let direction = { x: 1, y: 0 }; let lastDirection = { x: 1, y: 0 }; let inputQueue = []; 
    let score = 0; let visualScore = 0; let level = 1; let currentXP = 0; let requiredXP = 10;
    let baseSpeedDelay = 120; let playingTime = 0;
    let lastRenderTime = 0; let timeSinceLastMove = 0;
    let particles = []; let deadSegments = []; let floatingTexts = []; enemies = [];
    let comboMultiplier = 1; let comboTimer = 0; const MAX_COMBO_TIME = 2000; let hitStopRemaining = 0;

    function getValidSpawnPos() {
        let pos = {x: 0, y: 0}; let valid = false;
        while (!valid) {
            pos.x = Math.floor(Math.random() * TILES_X); pos.y = Math.floor(Math.random() * TILES_Y);
            valid = !snake.some(s => s.x === pos.x && s.y === pos.y) 
                 && !apples.some(a => a && a.x === pos.x && a.y === pos.y) 
                 && (!mouse || (mouse.x !== pos.x && mouse.y !== pos.y))
                 && !enemies.some(e => e.segments.some(s => s.x === pos.x && s.y === pos.y));
        }
        return pos;
    }

    function spawnApple(index) {
        if (!nextApples[index]) nextApples[index] = getValidSpawnPos();
        apples[index] = { x: nextApples[index].x, y: nextApples[index].y, type: 'normal' };
        if (activePerks.kwasZoladkowy && Math.random() < 0.25) apples[index].type = 'acid';
        nextApples[index] = getValidSpawnPos();
    }

    function applyPerk(perkName, isFromMouse = false) {
        if (!isFromMouse) {
            if (teleportDuration > 0) teleportDuration--; 
            if (activePerks.grubyPancerz) armorUses = 1; 
            level++; currentXP = currentXP - requiredXP; requiredXP = Math.floor(10 * Math.pow(level, 1.5));

            if (level > 2 && level % 4 === 0) spawnEnemy();
        } else { document.getElementById('mouse-screen').style.display = 'none'; }
        
        if (perkName === 'Duch') { effectTimers.ghost = 10000; } 
        else if (perkName === 'Dieta Cud') { snake = snake.slice(0, Math.max(3, snake.length - 3)); }
        else if (perkName === 'Żółwie Tempo') { baseSpeedDelay = Math.floor(baseSpeedDelay * 1.10); } 
        else if (perkName === 'Złomiarz') { if(maxApples === 1) { maxApples = 2; spawnApple(1); } }
        else if (perkName === 'Gruby Pancerz') { activePerks.grubyPancerz = true; armorUses = 1; }
        else if (perkName === 'Dalekowidz') { activePerks.dalekowidz = true; }
        else if (perkName === 'Złote Jabłka') { activePerks.zloteJablka = true; }
        else if (perkName === 'Zastrzyk Adrenaliny') { activePerks.zastrzykAdrenaliny = true; } 
        else if (perkName === 'Ostre Zakręty') { activePerks.ostreZakrety = true; }
        else if (perkName === 'Kwas żołądkowy') { activePerks.kwasZoladkowy = true; }
        else if (perkName === 'Ostatnie Tchnienie') { activePerks.ostatnieTchnienie = true; }
        else if (perkName === 'Zamrożenie Czasu') { activePerks.zamrozenieCzasu = true; }

        if (!isMusicPlaying) { isMusicPlaying = true; currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.1; requestAnimationFrame(scheduleMusic); } 
        else { currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.1; }
    }

    function spawnFloatingText(x, y, text, color) { floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, vy: -1 }); }
    function updateFloatingTexts(deltaTime) {
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i]; ft.y += ft.vy; ft.life -= deltaTime * 0.0015;
            if (ft.life <= 0) floatingTexts.splice(i, 1);
        }
    }

    function updateTimers(deltaTime) {
        let uiContent = '';
        if (activePerks.grubyPancerz && armorUses > 0) uiContent += `<div class="effect-badge" style="color: #fff; border-color: #fff">🛡️ PANCERZ (1)</div>`;
        if (activePerks.zastrzykAdrenaliny) uiContent += `<div class="effect-badge" style="color: #4da6ff; border-color: #4da6ff">💉 Adrenalina Gotowa</div>`;
        else if (effectTimers.adrenaline > 0) { effectTimers.adrenaline -= deltaTime; uiContent += `<div class="effect-badge" style="color: #4da6ff; border-color: #4da6ff">Adrenalina: ${(effectTimers.adrenaline/1000).toFixed(1)}s</div>`; }
        if (activePerks.zamrozenieCzasu) uiContent += `<div class="effect-badge" style="color: #ffd700; border-color: #ffd700">❄️ Zamrożenie Gotowe</div>`;
        else if (effectTimers.freeze > 0) { effectTimers.freeze -= deltaTime; uiContent += `<div class="effect-badge" style="color: #ffd700; border-color: #ffd700">Zamrożenie: ${(effectTimers.freeze/1000).toFixed(1)}s</div>`; }
        if (effectTimers.ghost > 0) { effectTimers.ghost -= deltaTime; uiContent += `<div class="effect-badge" style="color: #fff; border-color: #fff">Duch: ${(effectTimers.ghost/1000).toFixed(1)}s</div>`; }
        if (activePerks.ostatnieTchnienie) { uiContent += `<div class="effect-badge" style="color: #ff073a; border-color: #ff073a">❤️‍🔥 Ostatnie Tchnienie Gotowe</div>`; }
        document.getElementById('status-effects').innerHTML = uiContent;

        if (comboMultiplier > 1) {
            comboTimer -= deltaTime;
            if (comboTimer <= 0) { comboMultiplier = 1; document.getElementById('combo-display').classList.remove('combo-active'); }
        }

        if (luckyRainTimer > 0) {
            luckyRainTimer -= deltaTime;
            if(luckyRainTimer <= 0) rainCoins = []; 
        }
    }

    function getDynamicSpeed() {
        let speed = baseSpeedDelay;
        if (effectTimers.freeze > 0) speed *= 2; 
        if (effectTimers.adrenaline > 0) speed *= 0.4; 
        return speed;
    }

    function killEnemy(e, index) {
        spawnParticles(e.segments[0].x * TILE_SIZE + 15, e.segments[0].y * TILE_SIZE + 15, '#ff8800', 30);
        spawnFloatingText(e.segments[0].x * TILE_SIZE, e.segments[0].y * TILE_SIZE - 10, '+200 PKT', '#ff8800');
        score += 200; updateHUD(); playSound('eat', 3);
        for(let j=0; j<4; j++) { 
            if(e.segments[j]) rainCoins.push({x: e.segments[j].x, y: e.segments[j].y}); 
        }
        wrapper.classList.add('shake'); setTimeout(() => wrapper.classList.remove('shake'), 200);
        enemies.splice(index, 1);
    }

    function updateEnemies() {
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];

            // 1. NERF PRĘDKOŚCI: Wróg porusza się 2x wolniej niż gracz (omija co drugą turę)
            if (e.skipTurn === undefined) e.skipTurn = false;
            e.skipTurn = !e.skipTurn;
            if (e.skipTurn) continue;

            let possibleDirs = [{x:0,y:-1}, {x:0,y:1}, {x:-1,y:0}, {x:1,y:0}];
            possibleDirs = possibleDirs.filter(d => !(d.x === -e.dir.x && d.y === -e.dir.y));

            // 2. NERF WZROKU: Wróg widzi tylko ściany i swój ogon. Jesteś dla niego niewidzialny!
            let safeDirs = possibleDirs.filter(d => {
                let nx = e.segments[0].x + d.x; let ny = e.segments[0].y + d.y;
                if (nx < 0 || nx >= TILES_X || ny < 0 || ny >= TILES_Y) return false;
                if (e.segments.some(s => s.x === nx && s.y === ny)) return false;
                return true;
            });

            if (safeDirs.length === 0) {
                // Wróg wpadł w pułapkę ścienną lub zaplątał się we własny ogon
                killEnemy(e, i);
                continue;
            }

            let px = snake[0].x; let py = snake[0].y;
            let keepDirSafe = safeDirs.some(d => d.x === e.dir.x && d.y === e.dir.y);

            // 3. NERF INTELIGENCJI: Zachowuje się jak leniwy wąż
            if (keepDirSafe && Math.random() < 0.70) {
                // W 70% jedzie leniwie przed siebie
            } else {
                if (Math.random() < 0.80) {
                    // Skręca losowo i bez namysłu
                    e.dir = safeDirs[Math.floor(Math.random() * safeDirs.length)];
                } else {
                    // Tylko w ułamku przypadków włącza radar na Twoją pozycję
                    safeDirs.sort((a, b) => {
                        let distA = Math.abs((e.segments[0].x + a.x) - px) + Math.abs((e.segments[0].y + a.y) - py);
                        let distB = Math.abs((e.segments[0].x + b.x) - px) + Math.abs((e.segments[0].y + b.y) - py);
                        return distA - distB;
                    });
                    e.dir = safeDirs[0];
                }
            }

            let head = {x: e.segments[0].x + e.dir.x, y: e.segments[0].y + e.dir.y};
            
            // 4. ŚMIERTELNY BŁĄD: Jeśli wróg wjedzie w Twoje ciało, natychmiast ginie
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                killEnemy(e, i);
                continue;
            }

            e.segments.unshift(head);
            if (e.segments.length > e.length) e.segments.pop();
        }
    }

    function gameLoop(currentTime) {
        if (![STATES.PLAYING, STATES.LEVELUP, STATES.DEATH_ANIM, STATES.REVIVE_PAUSE, STATES.MOUSE_ROLLING, STATES.MOUSE_REWARD].includes(currentState)) return;
        requestAnimationFrame(gameLoop);
        const deltaTime = currentTime - lastRenderTime; lastRenderTime = currentTime;

        if (visualScore < score) { visualScore += Math.ceil((score - visualScore) * 0.1); updateHUD(); }
        updateParticles(deltaTime); updateFloatingTexts(deltaTime);

        if (currentState === STATES.PLAYING) {
            playingTime += deltaTime; updateTimers(deltaTime);
            if (hitStopRemaining > 0) { hitStopRemaining -= deltaTime; } 
            else { 
                timeSinceLastMove += deltaTime; 
                if (timeSinceLastMove >= getDynamicSpeed()) { 
                    updateSnake(); 
                    if(currentState === STATES.PLAYING) updateEnemies(); 
                    timeSinceLastMove = 0; 
                } 
            }
        } 
        else if (currentState === STATES.DEATH_ANIM) {
            deadSegments.forEach(seg => {
                seg.x += seg.vx; seg.y += seg.vy; seg.rot += seg.rotSpeed;
                seg.vx *= 0.94; seg.vy *= 0.94; seg.size *= 0.98; 
            });
        }
        else if (currentState === STATES.MOUSE_ROLLING) {
            rollDuration -= deltaTime; timeSinceLastRoll += deltaTime;
            if (timeSinceLastRoll >= rollInterval) {
                let legendaries = ALL_PERKS.filter(p => p.rarity === 'legendary');
                renderMouseCard(legendaries[Math.floor(Math.random() * legendaries.length)], false);
                playTick(); timeSinceLastRoll = 0; rollInterval = 50 + ((3000 - rollDuration) / 10);
            }
            if (rollDuration <= 0) {
                currentState = STATES.MOUSE_REWARD; playRevealSound();
                wrapper.classList.add('shake-heavy'); setTimeout(() => wrapper.classList.remove('shake-heavy'), 500); 
                document.getElementById('mouse-title').innerText = "ZDOBYWASZ LEGENDĘ!"; document.getElementById('mouse-title').style.color = '#ffd700';
                document.getElementById('mouse-subtitle').innerText = "Kliknij kartę, aby odebrać nagrodę.";
                renderMouseCard(finalLegendaryPerk, true);
                setFocusableElements('#mouse-screen .card.jackpot');
            }
        }
        draw();
    }

    function collectCoin() {
        runCoins++; bankCoins++; localStorage.setItem('rogueSnakeCoins', bankCoins);
        playSound('coin'); 
        spawnFloatingText(snake[0].x * TILE_SIZE, snake[0].y * TILE_SIZE - 10, '+1 🪙', '#ffd700');
        updateHUD();
    }

    function updateSnake() {
        if (inputQueue.length > 0) {
            let requestedDir = inputQueue.shift();
            if (requestedDir.x === -direction.x && requestedDir.y === -direction.y) {
                if (activePerks.ostreZakrety) {
                    snake.reverse(); direction = requestedDir; lastDirection = requestedDir;
                    spawnParticles(snake[0].x * TILE_SIZE + 15, snake[0].y * TILE_SIZE + 15, '#ffffff', 15);
                }
            } else { direction = requestedDir; lastDirection = direction; }
        }

        let head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

        if (teleportDuration > 0) {
            if (head.x < 0) head.x = TILES_X - 1; else if (head.x >= TILES_X) head.x = 0;
            if (head.y < 0) head.y = TILES_Y - 1; else if (head.y >= TILES_Y) head.y = 0;
        }

        let isInvulnerable = (effectTimers.adrenaline > 0) || (effectTimers.ghost > 0);
        let hitTail = snake.some((segment, i) => i !== 0 && segment.x === head.x && segment.y === head.y);
        let hitEnemy = enemies.some(e => e.segments.some(seg => seg.x === head.x && seg.y === head.y));

        if (head.x < 0 || head.x >= TILES_X || head.y < 0 || head.y >= TILES_Y) {
            if (activePerks.grubyPancerz && armorUses > 0) {
                let possibleDirs = [ {x:0,y:-1}, {x:0,y:1}, {x:-1,y:0}, {x:1,y:0} ];
                let validDirs = possibleDirs.filter(d => {
                    let nx = snake[0].x + d.x; let ny = snake[0].y + d.y;
                    if (d.x === -direction.x && d.y === -direction.y && snake.length > 1) return false;
                    if (nx < 0 || nx >= TILES_X || ny < 0 || ny >= TILES_Y) return false;
                    if (snake.some(seg => seg.x === nx && seg.y === ny)) return false;
                    return true;
                });
                if (validDirs.length > 0) {
                    direction = validDirs[Math.floor(Math.random() * validDirs.length)];
                    head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
                    lastDirection = direction; inputQueue = []; armorUses--;
                    playSound('bounce'); spawnFloatingText(snake[0].x * TILE_SIZE, snake[0].y * TILE_SIZE - 10, 'PANCERZ!', '#aaa');
                    wrapper.classList.add('shake'); setTimeout(() => wrapper.classList.remove('shake'), 200);
                } else return triggerDeath();
            } else return triggerDeath();
        }
        if ((hitTail || hitEnemy) && !isInvulnerable) return triggerDeath(); 

        snake.unshift(head); 
        let ateApple = false;

        for (let i = rainCoins.length - 1; i >= 0; i--) {
            if (head.x === rainCoins[i].x && head.y === rainCoins[i].y) { rainCoins.splice(i, 1); collectCoin(); }
        }

        if (mouse && head.x === mouse.x && head.y === mouse.y) {
            score += 50; 
            bankCoins += 10; runCoins += 10; localStorage.setItem('rogueSnakeCoins', bankCoins);
            spawnParticles(mouse.x * TILE_SIZE + 15, mouse.y * TILE_SIZE + 15, '#aaaaaa', 40); 
            spawnFloatingText(mouse.x * TILE_SIZE, mouse.y * TILE_SIZE - 20, '+10 🪙', '#ffd700');
            mouse = null;
            return triggerMouseReward(); 
        }

        apples.forEach((ap, index) => {
            if (ap && head.x === ap.x && head.y === ap.y) {
                ateApple = true; playSound('eat', comboMultiplier); 
                
                let scoreMultiplier = comboMultiplier; let gainedXP = activePerks.zloteJablka ? 20 : 10;
                score += (10 * scoreMultiplier); currentXP += gainedXP;
                if (activePerks.zloteJablka) growthQueue += 1; 
                
                comboMultiplier++; comboTimer = MAX_COMBO_TIME;
                if(comboMultiplier > 1) {
                    const cd = document.getElementById('combo-display'); cd.innerText = `COMBO x${comboMultiplier}!`;
                    cd.classList.remove('combo-active'); void cd.offsetWidth; cd.classList.add('combo-active');
                }

                if (ap.type === 'acid') {
                    hitStopRemaining = 80; wrapper.classList.add('shake'); setTimeout(() => wrapper.classList.remove('shake'), 200);
                    spawnParticles(ap.x * TILE_SIZE + 15, ap.y * TILE_SIZE + 15, '#adff2f', 30); spawnFloatingText(ap.x * TILE_SIZE, ap.y * TILE_SIZE - 10, 'BOOM!', '#adff2f');
                    snake = snake.slice(0, Math.max(3, snake.length - 5)); 
                } else {
                    hitStopRemaining = 40; 
                    let popColor = activeSkin.type === 'viper' ? '#00ff00' : (activePerks.zloteJablka ? '#ffd700' : '#ff073a');
                    spawnParticles(ap.x * TILE_SIZE + 15, ap.y * TILE_SIZE + 15, popColor, 15);
                    spawnFloatingText(ap.x * TILE_SIZE, ap.y * TILE_SIZE - 10, `+${10 * scoreMultiplier}`, '#ffd700');
                    if (!mouse && Math.random() < 0.10) spawnMouse(); 
                }

                if (activePerks.zastrzykAdrenaliny) { effectTimers.adrenaline = 2000; activePerks.zastrzykAdrenaliny = false; spawnFloatingText(ap.x * TILE_SIZE, ap.y * TILE_SIZE - 30, 'ADRENALINA!', '#4da6ff'); }
                if (activePerks.zamrozenieCzasu) { effectTimers.freeze = 3000; activePerks.zamrozenieCzasu = false; spawnFloatingText(ap.x * TILE_SIZE, ap.y * TILE_SIZE - 30, 'ZAMROŻENIE!', '#ffd700');}

                const xpBar = document.getElementById('xp-bar'); xpBar.classList.remove('flash'); void xpBar.offsetWidth; xpBar.classList.add('flash');
                if (currentXP >= requiredXP) triggerLevelUp();
                
                spawnApple(index); updateHUD(); baseSpeedDelay = Math.max(40, baseSpeedDelay - 1.5); 
            }
        });

        if (!ateApple) { if (growthQueue > 0) growthQueue--; else snake.pop(); }
    }

    // --- NOWY SYSTEM KONTROLI KLAWIATURĄ ---
    window.addEventListener('keydown', e => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        // Zablokuj przewijanie strony strzałkami/spacją
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
            e.preventDefault();
        }

        if (currentState === STATES.PLAYING) {
            let nextDir = null;
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W')) nextDir = { x: 0, y: -1 };
            if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S')) nextDir = { x: 0, y: 1 };
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A')) nextDir = { x: -1, y: 0 };
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D')) nextDir = { x: 1, y: 0 };

            if (nextDir) {
                let baseDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : direction;
                if (nextDir.x === -baseDir.x && nextDir.y === -baseDir.y) {
                    if (activePerks.ostreZakrety && inputQueue.length < 2) inputQueue.push(nextDir);
                } else { if (inputQueue.length < 2) inputQueue.push(nextDir); }
            }
        } 
        else if ([STATES.MENU, STATES.SKINS, STATES.LEVELUP, STATES.GAMEOVER, STATES.MOUSE_REWARD].includes(currentState)) {
            // Nawigacja w menu
            if (['ArrowUp', 'w', 'W', 'ArrowLeft', 'a', 'A'].includes(e.key)) {
                if (focusableElements.length > 0) {
                    focusIndex = (focusIndex - 1 + focusableElements.length) % focusableElements.length;
                    updateFocusVisuals(); playTick();
                }
            }
            if (['ArrowDown', 's', 'S', 'ArrowRight', 'd', 'D'].includes(e.key)) {
                if (focusableElements.length > 0) {
                    focusIndex = (focusIndex + 1) % focusableElements.length;
                    updateFocusVisuals(); playTick();
                }
            }
            if (e.key === 'Enter' || e.key === ' ') {
                if (focusableElements.length > 0 && focusableElements[focusIndex]) {
                    focusableElements[focusIndex].click();
                }
            }
        }
    });

    function draw() {
        if (luckyRainTimer > 0) {
            let hue = (Date.now() / 5) % 360; ctx.fillStyle = `hsla(${hue}, 100%, 15%, 1)`; ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        if (effectTimers.freeze > 0) { ctx.fillStyle = 'rgba(77, 166, 255, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }

        if (activeSkin.type === 'viper') {
            ctx.strokeStyle = `rgba(255, 60, 0, ${0.5 + Math.random() * 0.5})`; 
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff3c00'; ctx.lineWidth = 3;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 1; ctx.shadowBlur = 0;
            ctx.strokeStyle = `rgba(255, 60, 0, ${0.1 + Math.random() * 0.2})`;
        } else {
            ctx.strokeStyle = '#1a1a24'; ctx.lineWidth = 1;
        }

        for (let i = 0; i <= canvas.width; i += TILE_SIZE) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        if ([STATES.PLAYING, STATES.LEVELUP, STATES.REVIVE_PAUSE, STATES.MOUSE_ROLLING, STATES.MOUSE_REWARD].includes(currentState)) {
            
            if(activePerks.dalekowidz) {
                ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; 
                nextApples.forEach(nap => { if(nap) ctx.fillRect(nap.x * TILE_SIZE + 8, nap.y * TILE_SIZE + 8, TILE_SIZE - 16, TILE_SIZE - 16); });
            }

            ctx.shadowBlur = 10; ctx.shadowColor = '#ffd700'; ctx.fillStyle = '#ffd700';
            rainCoins.forEach(rc => {
                ctx.beginPath(); ctx.arc(rc.x*TILE_SIZE + TILE_SIZE/2, rc.y*TILE_SIZE + TILE_SIZE/2, TILE_SIZE/3, 0, Math.PI*2); ctx.fill();
            });

            if (mouse) {
                ctx.shadowBlur = 15 + Math.sin(Date.now() / 150) * 5; ctx.shadowColor = '#ffffff'; ctx.fillStyle = '#aaaaaa';
                let mx = mouse.x * TILE_SIZE; let my = mouse.y * TILE_SIZE;
                ctx.fillRect(mx + 4, my + 4, TILE_SIZE - 8, TILE_SIZE - 8); ctx.fillStyle = '#ff99cc'; ctx.fillRect(mx + 8, my + 8, 6, 6); 
            }

            ctx.shadowBlur = 15;
            apples.forEach(ap => {
                if(ap) {
                    if (ap.type === 'acid') { 
                        ctx.shadowColor = '#adff2f'; ctx.fillStyle = '#adff2f'; 
                        ctx.fillRect(ap.x * TILE_SIZE + 4, ap.y * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    } 
                    else if (activeSkin.type === 'viper') {
                        ctx.shadowColor = '#00ff00'; ctx.fillStyle = '#00ff00';
                        ctx.fillRect(ap.x * TILE_SIZE + 4, ap.y * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                        ctx.fillStyle = '#000'; ctx.font = 'bold 12px Courier New'; ctx.shadowBlur = 0;
                        ctx.fillText(Math.random() > 0.5 ? '1' : '0', ap.x * TILE_SIZE + TILE_SIZE/2, ap.y * TILE_SIZE + Math.floor(TILE_SIZE/1.5));
                    } 
                    else { 
                        let acolor = activePerks.zloteJablka ? '#ffd700' : '#ff073a'; ctx.shadowColor = acolor; ctx.fillStyle = acolor; 
                        ctx.fillRect(ap.x * TILE_SIZE + 4, ap.y * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    }
                }
            });
            
            // Wrogowie
            enemies.forEach(e => {
                ctx.shadowBlur = 10; ctx.shadowColor = e.color;
                for(let i=0; i<e.segments.length; i++) {
                    let seg = e.segments[i];
                    let padding = 4;
                    let size = TILE_SIZE - (padding*2); let cx = seg.x * TILE_SIZE + padding; let cy = seg.y * TILE_SIZE + padding;
                    ctx.fillStyle = i === 0 ? e.headColor : e.color;
                    ctx.fillRect(cx, cy, size, size);
                    if(i===0) {
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(cx + size/4, cy + size/4, 4, 4);
                        ctx.fillRect(cx + size - size/4 - 4, cy + size/4, 4, 4);
                    }
                }
            });
        }

        ctx.shadowBlur = 10; ctx.shadowColor = activeSkin.type==='rainbow' ? '#ffffff' : (activeSkin.type==='viper' ? activeSkin.head : activeSkin.body);
        
        if ([STATES.PLAYING, STATES.LEVELUP, STATES.REVIVE_PAUSE, STATES.MOUSE_ROLLING, STATES.MOUSE_REWARD].includes(currentState)) {
            if (effectTimers.ghost > 0) ctx.globalAlpha = 0.4;
            if (effectTimers.adrenaline > 0) ctx.shadowColor = '#4da6ff';

            for (let index = snake.length - 1; index > 0; index--) {
                const segment = snake[index];
                let padding = 2 + (index * 0.1); if(padding > 6) padding = 6;
                let size = TILE_SIZE - (padding*2); let cx = segment.x * TILE_SIZE + padding; let cy = segment.y * TILE_SIZE + padding;
                let drawColor = activeSkin.body;
                
                if(activeSkin.type === 'rainbow') drawColor = `hsl(${(Date.now()/10 + index * 15) % 360}, 100%, 50%)`;
                if(teleportDuration > 0 && index%2===0) drawColor = '#a366ff';
                if(effectTimers.adrenaline > 0) drawColor = '#4da6ff';

                ctx.fillStyle = drawColor;
                if(activeSkin.type === 'virus') { ctx.beginPath(); ctx.arc(cx + size/2, cy + size/2, size/2, 0, Math.PI*2); ctx.fill(); } 
                else if(activeSkin.type === 'train') { ctx.fillRect(cx, cy, size, size); ctx.fillStyle = '#111'; ctx.fillRect(cx+4, cy+4, size-8, size-8); } 
                else if(activeSkin.type === 'viper') { ctx.strokeStyle = activeSkin.head; ctx.lineWidth=2; ctx.strokeRect(cx, cy, size, size); ctx.fillStyle = '#333'; ctx.fillRect(cx, cy, size, size); ctx.fillStyle = drawColor; ctx.fillRect(cx+4, cy+4, size-8, size-8); }
                else { ctx.fillRect(cx, cy, size, size); }
            }

            if(snake.length > 0) {
                const head = snake[0];
                let cx = head.x * TILE_SIZE + TILE_SIZE/2; let cy = head.y * TILE_SIZE + TILE_SIZE/2;
                let angle = Math.atan2(lastDirection.y, lastDirection.x); let headSize = TILE_SIZE - 4;
                
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
                ctx.fillStyle = effectTimers.adrenaline > 0 ? '#80c1ff' : activeSkin.head;

                if (activeSkin.type === 'virus') {
                    ctx.beginPath(); ctx.arc(0, 0, headSize/2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#111'; ctx.fillRect(headSize/4, -4, 4, 8); 
                } else if (activeSkin.type === 'train') {
                    ctx.fillRect(-headSize/2, -headSize/2, headSize, headSize); ctx.fillStyle = '#ffff00'; ctx.fillRect(headSize/4, -headSize/4, 4, headSize/2); 
                } else if (activeSkin.type === 'viper') {
                    ctx.fillStyle = '#555'; ctx.fillRect(-headSize/2, -headSize/2, headSize, headSize);
                    ctx.shadowBlur = 10; ctx.shadowColor = activeSkin.head; ctx.fillStyle = activeSkin.head;
                    ctx.fillRect(-2, -headSize/2 + 2, 6, headSize - 4); 
                } else {
                    ctx.fillRect(-headSize/2, -headSize/2, headSize, headSize);
                    ctx.shadowBlur = 0; ctx.fillStyle = '#111'; 
                    ctx.fillRect(headSize/4 - 2, -headSize/2 + 2, 6, 6); ctx.fillRect(headSize/4 - 2, headSize/2 - 8, 6, 6);  
                    ctx.fillStyle = '#fff'; ctx.fillRect(headSize/4, -headSize/2 + 4, 2, 2); ctx.fillRect(headSize/4, headSize/2 - 6, 2, 2);
                    if (activeSkin.type !== 'rainbow') { 
                        let tongueLength = (Math.sin(Date.now() / 150) * 4) + 6; ctx.fillStyle = '#ff073a';
                        ctx.fillRect(headSize/2, -1, tongueLength, 2); ctx.fillRect(headSize/2 + tongueLength, -3, 2, 2); ctx.fillRect(headSize/2 + tongueLength, 1, 2, 2); 
                    }
                }
                ctx.restore();
            }
            ctx.globalAlpha = 1.0;
        }

        if (currentState === STATES.DEATH_ANIM) {
            deadSegments.forEach(seg => {
                if (seg.size <= 0) return;
                ctx.save(); ctx.translate(seg.x, seg.y); ctx.rotate(seg.rot);
                ctx.fillStyle = seg.color; ctx.shadowBlur = 10; ctx.shadowColor = seg.color;
                
                if (seg.shape === 'virus') { ctx.beginPath(); ctx.arc(0, 0, seg.size/2, 0, Math.PI*2); ctx.fill(); } 
                else if (seg.shape === 'train') { ctx.fillRect(-seg.size/2, -seg.size/2, seg.size, seg.size); if(!seg.isHead) { ctx.fillStyle = '#111'; ctx.fillRect(-seg.size/2+4, -seg.size/2+4, seg.size-8, seg.size-8); } } 
                else if (seg.shape === 'viper') { ctx.strokeStyle = activeSkin.head; ctx.lineWidth=2; ctx.strokeRect(-seg.size/2, -seg.size/2, seg.size, seg.size); ctx.fillStyle = '#555'; ctx.fillRect(-seg.size/2, -seg.size/2, seg.size, seg.size); }
                else {
                    ctx.fillRect(-seg.size/2, -seg.size/2, seg.size, seg.size);
                    if(seg.isHead && seg.size > 10 && seg.shape === 'snake') {
                        ctx.shadowBlur = 0; ctx.fillStyle = '#111';
                        ctx.fillRect(seg.size/4 - 2, -seg.size/2 + 2, 4, 4); ctx.fillRect(seg.size/4 - 2, seg.size/2 - 6, 4, 4);
                    }
                }
                ctx.restore();
            });
        }

        ctx.shadowBlur = 5;
        particles.forEach(p => { ctx.shadowColor = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
        ctx.shadowBlur = 5; ctx.font = 'bold 20px Courier New'; ctx.textAlign = 'center';
        floatingTexts.forEach(ft => { ctx.globalAlpha = ft.life; ctx.shadowColor = ft.color; ctx.fillStyle = ft.color; ctx.fillText(ft.text, ft.x + TILE_SIZE/2, ft.y); });

        ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
    }

    function spawnParticles(x, y, color, count = 15) { for (let i = 0; i < count; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12, life: 1.0, size: Math.random() * 4 + 2, color: color }); } }
    function updateParticles(deltaTime) { for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= deltaTime * 0.002; if (p.life <= 0) particles.splice(i, 1); } }
    function updateHUD() { document.getElementById('score-display').innerText = `Wynik: ${visualScore}`; document.getElementById('level-display').innerText = `Poziom: ${level}`; document.getElementById('xp-bar').style.width = `${Math.min((currentXP / requiredXP) * 100, 100)}%`; }

    // Start
    updateMenuCoins();
    setFocusableElements('#menu-screen button');
    ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>

</body>
